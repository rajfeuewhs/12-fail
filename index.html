<!DOCTYPE html>
<html>
<head>
<title>Pro Confession</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#000;
  color:white;
}

.container{
  max-width:500px;
  margin:auto;
  padding:15px;
}

.card{
  background:#1a1a1a;
  padding:12px;
  border-radius:15px;
  margin-top:15px;
  cursor:pointer;
  transition:0.3s;
}

.card:hover{ background:#222; }

.full{
  display:none;
  margin-top:10px;
}

.fab{
  position:fixed;
  bottom:20px;
  right:20px;
  background:#3b82f6;
  width:55px;
  height:55px;
  border-radius:50%;
  font-size:30px;
  display:flex;
  justify-content:center;
  align-items:center;
}

#popup{
  display:none;
  position:fixed;
  bottom:0;
  width:100%;
  background:#000;
  padding:15px;
}

input, textarea{
  width:100%;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button{
  width:100%;
  padding:10px;
  margin-top:10px;
  border:none;
  border-radius:10px;
  background:#3b82f6;
  color:white;
}

</style>
</head>

<body>

<!-- LOGIN -->
<div id="login">
  <div class="container">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>
</div>

<div id="app" style="display:none;">
  <div class="container">
    <h2>My Confessions</h2>
    <div id="data"></div>
  </div>

  <div class="fab" onclick="openPopup()">+</div>

  <div id="popup">
    <textarea id="text"></textarea>
    <input type="file" id="img">
    <button onclick="startRecording()">🎤 Record</button>
    <button onclick="saveData()">Save</button>
  </div>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-storage.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDf6yp...",
  authDomain: "failstory-2577f.firebaseapp.com",
  databaseURL: "https://failstory-a1191-default-rtdb.firebaseio.com/",
  projectId: "failstory-2577f",
  storageBucket: "failstory-2577f.appspot.com"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();
const storage = firebase.storage();

function login(){
  let e = email.value;
  let p = password.value;

  auth.signInWithEmailAndPassword(e,p)
  .then(()=>{
    login.style.display="none";
    app.style.display="block";
    loadData();
  })
  .catch(()=>alert("error"));
}

function openPopup(){
  popup.style.display="block";
}

let mediaRecorder;
let audioBlob;

function startRecording(){
  navigator.mediaDevices.getUserMedia({audio:true})
  .then(stream=>{
    mediaRecorder = new MediaRecorder(stream);
    mediaRecorder.start();

    mediaRecorder.ondataavailable = e=>{
      audioBlob = e.data;
    }

    setTimeout(()=>mediaRecorder.stop(),3000);
  });
}

function saveData(){
  let text = document.getElementById("text").value;
  let time = new Date().toLocaleString();

  db.ref("confessions").push({text,time});
  location.reload();
}

function toggle(id){
  let el = document.getElementById(id);
  el.style.display = el.style.display=="none"?"block":"none";
}

function loadData(){
  db.ref("confessions").on("value",snap=>{
    let data = snap.val();
    let out="";

    for(let k in data){
      let short = data[k].text.substring(0,40);

      out += `
      <div class="card" onclick="toggle('${k}')">
        ${short}...
        <div class="full" id="${k}">
          <p>${data[k].text}</p>
        </div>
      </div>`;
    }

    document.getElementById("data").innerHTML=out;
  });
}
</script>

</body>
</html>
