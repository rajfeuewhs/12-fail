<!DOCTYPE html>
<html>
<head>
  <title>My Confession</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #000;
      color: white;
    }

    .container {
      max-width: 500px;
      margin: auto;
      padding: 15px;
    }

    h2 {
      text-align: center;
      color: #ccc;
    }

    textarea {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: #111;
      color: white;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 10px;
      background: #3b82f6;
      color: white;
      font-weight: bold;
    }

    /* 📦 SMALL CARD */
    .card {
      background: #1a1a1a;
      padding: 12px;
      border-radius: 15px;
      margin-top: 15px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      background: #222;
    }

    .time {
      font-size: 12px;
      color: #888;
      margin-top: 5px;
    }

    /* 📂 EXPANDED VIEW */
    .full {
      display: none;
      background: #111;
      padding: 15px;
      border-radius: 15px;
      margin-top: 10px;
      animation: fade 0.3s ease;
    }

    @keyframes fade {
      from {opacity: 0;}
      to {opacity: 1;}
    }

    .delete {
      margin-top: 10px;
      color: red;
      font-size: 12px;
    }

    /* ➕ FLOAT BUTTON */
    .fab {
      position: fixed;
      bottom: 20px;
      right: 20px;
      background: #3b82f6;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      font-size: 30px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
    }

    /* 📝 INPUT POPUP */
    #popup {
      display: none;
      position: fixed;
      bottom: 0;
      width: 100%;
      background: #000;
      padding: 15px;
      border-top: 2px solid #333;
    }
  </style>
</head>

<body>

<div class="container">

  <h2>My Confessions</h2>

  <div id="data"></div>

</div>

<!-- ➕ BUTTON -->
<div class="fab" onclick="openPopup()">+</div>

<!-- INPUT POPUP -->
<div id="popup">
  <textarea id="text" placeholder="Write your thoughts..."></textarea>
  <button onclick="saveData()">Save</button>
</div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDf6ypJBB8UaHpPV79RUbyBH9BfuxJ73Aw",
  authDomain: "failstory-2577f.firebaseapp.com",
  databaseURL: "https://failstory-a1191-default-rtdb.firebaseio.com/",
  projectId: "failstory-2577f",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function openPopup(){
  document.getElementById("popup").style.display="block";
}

function saveData() {
  let text = document.getElementById("text").value;
  let time = new Date().toLocaleString();

  db.ref("confessions").push({ text, time });
  location.reload();
}

function toggle(id){
  let el = document.getElementById(id);
  el.style.display = el.style.display === "none" ? "block" : "none";
}

function deleteData(id){
  db.ref("confessions/"+id).remove();
}

function loadData() {
  db.ref("confessions").on("value", snapshot => {
    let data = snapshot.val();
    let output = "";

    for (let key in data) {
      let short = data[key].text.substring(0, 40);

      output += `
        <div class="card" onclick="toggle('${key}')">
          ${short}...
          <div class="time">${data[key].time}</div>

          <div class="full" id="${key}">
            <p>${data[key].text}</p>
            <div class="delete" onclick="deleteData('${key}')">Delete</div>
          </div>
        </div>
      `;
    }

    document.getElementById("data").innerHTML = output;
  });
}

loadData();
</script>

</body>
</html>
