<!DOCTYPE html>
<html>
<head>
  <title>My Confession</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 20px;
    }

    textarea {
      width: 100%;
      padding: 10px;
    }

    button {
      padding: 10px;
      background: orange;
      border: none;
      cursor: pointer;
    }

    .timeline {
      border-left: 3px solid white;
      margin-top: 30px;
      padding-left: 20px;
    }

    .box {
      background: #222;
      padding: 10px;
      margin: 20px 0;
      border-radius: 8px;
      position: relative;
    }

    .time {
      font-size: 12px;
      color: #aaa;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<h2>Write Confession</h2>

<textarea id="text" rows="4"></textarea><br><br>
<button onclick="saveData()">Save</button>

<div class="timeline" id="data"></div>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDf6ypJBB8UaHpPV79RUbyBH9BfuxJ73Aw",
  authDomain: "failstory-2577f.firebaseapp.com",
  databaseURL: "https://failstory-a1191-default-rtdb.firebaseio.com/",
  projectId: "failstory-2577f",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

function saveData() {
  let text = document.getElementById("text").value;
  let time = new Date().toLocaleString();

  db.ref("confessions").push({ text, time });
  location.reload();
}

function loadData() {
  db.ref("confessions").on("value", snapshot => {
    let data = snapshot.val();
    let output = "";

    for (let key in data) {
      output += `
        <div class="box">
          <div>${data[key].text}</div>
          <div class="time">${data[key].time}</div>
        </div>
      `;
    }

    document.getElementById("data").innerHTML = output;
  });
}

loadData();
</script>

</body>
</html>
