<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Google Login Firebase</title>
</head>
<body>

  <h2>Firebase Google Login</h2>
  <button onclick="login()">Login with Google</button>
  <button onclick="logout()">Logout</button>

  <p id="user"></p>

  <script type="module">
    // Import Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { 
      getAuth, 
      GoogleAuthProvider, 
      signInWithPopup,
      signOut 
    } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

    // Firebase config (tumhara)
    const firebaseConfig = {
      apiKey: "AIzaSyAMxvOE99yPPhttJ5686_fpAP8Y5k2QUaA",
      authDomain: "failstory-a1191.firebaseapp.com",
      databaseURL: "https://failstory-a1191-default-rtdb.firebaseio.com",
      projectId: "failstory-a1191",
      storageBucket: "failstory-a1191.firebasestorage.app",
      messagingSenderId: "786523661240",
      appId: "1:786523661240:web:ec191e79ada401f713a54d"
    };

    // Initialize Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // LOGIN FUNCTION
    window.login = function () {
      signInWithPopup(auth, provider)
        .then((result) => {
          const user = result.user;
          document.getElementById("user").innerText =
            "Logged in: " + user.displayName;
        })
        .catch((error) => {
          console.error(error);
          alert(error.message);
        });
    };

    // LOGOUT FUNCTION
    window.logout = function () {
      signOut(auth).then(() => {
        document.getElementById("user").innerText = "Logged out";
      });
    };
  </script>

</body>
</html>
